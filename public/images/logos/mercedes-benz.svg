<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" fill="#000">
  <!-- Three-pointed star in circle -->
  <g transform="translate(40,36)">
    <!-- Outer circle (ring) -->
    <circle cx="0" cy="0" r="28" fill="none" stroke="#000" stroke-width="3.5"/>
    <!-- Three-pointed star: center to top, bottom-left, bottom-right -->
    <line x1="0" y1="0" x2="0" y2="-22" stroke="#000" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="-19.05" y2="11" stroke="#000" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="19.05" y2="11" stroke="#000" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- MERCEDES-BENZ wordmark -->
  <text x="160" y="40" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="400" letter-spacing="2.5" fill="#000">MERCEDES-BENZ</text>
</svg>